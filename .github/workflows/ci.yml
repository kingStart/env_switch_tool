name: CI

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: envtools

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # ─── Build GUI installers + CLI binaries ───
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    needs: [test, lint]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - platform: linux
            arch: x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu

          # Linux aarch64 (native ARM64 runner)
          - platform: linux
            arch: aarch64
            runner: ubuntu-24.04-arm64
            rust_target: aarch64-unknown-linux-gnu

          # macOS x86_64
          - platform: macos
            arch: x86_64
            runner: macos-13
            rust_target: x86_64-apple-darwin

          # macOS aarch64
          - platform: macos
            arch: aarch64
            runner: macos-latest
            rust_target: aarch64-apple-darwin

          # Windows x86_64
          - platform: windows
            arch: x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc

          # Windows aarch64
          - platform: windows
            arch: aarch64
            runner: windows-latest
            rust_target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Build CLI binary ──
      - name: Build CLI
        run: cargo build --release -p envtools-cli --target ${{ matrix.rust_target }}

      # ── Copy CLI to sidecar location ──
      - name: Prepare CLI sidecar (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p src-tauri/binaries
          cp target/${{ matrix.rust_target }}/release/envtools \
             src-tauri/binaries/envtools-${{ matrix.rust_target }}

      - name: Prepare CLI sidecar (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp target/${{ matrix.rust_target }}/release/envtools.exe \
             src-tauri/binaries/envtools-${{ matrix.rust_target }}.exe

      # ── Build installer via Tauri ──
      - name: Build installer (Tauri)
        run: npx tauri build --target ${{ matrix.rust_target }}

      # ── Package standalone CLI ──
      - name: Package CLI (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd target/${{ matrix.rust_target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-cli-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package CLI (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.rust_target }}/release/${{ env.BINARY_NAME }}.exe" `
            -DestinationPath "${{ env.BINARY_NAME }}-cli-${{ matrix.platform }}-${{ matrix.arch }}.zip"

      # ── Upload installer artifacts ──
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.zip
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
          retention-days: 30

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ env.BINARY_NAME }}-cli-*.tar.gz
            ${{ env.BINARY_NAME }}-cli-*.zip
          retention-days: 30

  # ─── Release: publish to GitHub Releases on tag push ───
  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release files
        run: find dist/ -type f | sort

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.rpm" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \
            -o -name "*.app.tar.gz" \) -exec sha256sum {} \; | sort > ../sha256sums.txt
          mv ../sha256sums.txt .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/sha256sums.txt
