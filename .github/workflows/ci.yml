name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check format (workspace)
        run: cargo fmt --all -- --check
      - name: Check format (src-tauri)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy (workspace)
        run: cargo clippy --workspace -- -D warnings

  # ─── Build installers: CLI (sidecar) + GUI via `tauri build` ───
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    needs: [test, lint]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu

          - platform: linux
            arch: aarch64
            runner: ubuntu-24.04-arm64
            rust_target: aarch64-unknown-linux-gnu

          - platform: macos
            arch: x86_64
            runner: macos-latest
            rust_target: x86_64-apple-darwin

          - platform: macos
            arch: aarch64
            runner: macos-latest
            rust_target: aarch64-apple-darwin

          - platform: windows
            arch: x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc

          - platform: windows
            arch: aarch64
            runner: windows-latest
            rust_target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: ${{ matrix.rust_target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.rust_target }}-cargo-build-

      # ── Step 1: Build CLI binary ──
      - name: Build CLI
        run: cargo build --release -p envtools-cli --target ${{ matrix.rust_target }}

      # ── Step 2: Copy CLI to sidecar location with target-triple naming ──
      - name: Prepare CLI sidecar (Unix)
        if: matrix.platform != 'windows'
        run: |
          cp target/${{ matrix.rust_target }}/release/envtools \
             src-tauri/binaries/envtools-${{ matrix.rust_target }}

      - name: Prepare CLI sidecar (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cp target/${{ matrix.rust_target }}/release/envtools.exe \
             src-tauri/binaries/envtools-${{ matrix.rust_target }}.exe

      # ── Step 3: Build installer via Tauri ──
      - name: Build installer (Tauri)
        run: npx tauri build --target ${{ matrix.rust_target }}

      # ── Package standalone CLI for all platforms ──
      - name: Package CLI binary (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          mkdir -p dist-cli
          cp target/${{ matrix.rust_target }}/release/envtools \
             dist-cli/envtools-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Package CLI binary (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist-cli
          cp target/${{ matrix.rust_target }}/release/envtools.exe \
             dist-cli/envtools-${{ matrix.platform }}-${{ matrix.arch }}.exe

      # ── Upload artifacts ──
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-cli/
          retention-days: 30

  # ─── Release: publish installers to GitHub Releases ───
  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer-*/**/*.exe
            dist/installer-*/**/*.AppImage
            dist/installer-*/**/*.dmg
            dist/cli-*/**/*
          generate_release_notes: true
