name: Feature Request
description: 提出新功能建议
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 这个功能要解决什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你期望的实现方式
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他实现方式？

  - type: textarea
    id: context
    attributes:
      label: 补充信息
