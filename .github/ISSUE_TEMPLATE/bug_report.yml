name: Bug Report
description: 报告一个 Bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: envtools 版本
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 日志、截图或其他有助于排查的信息
